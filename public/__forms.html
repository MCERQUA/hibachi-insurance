<!DOCTYPE html>
<html>
<head><title>Netlify Forms</title></head>
<body>
  <form name="quote" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="quote" />
    <input name="bot-field" type="hidden" />
    <input name="businessName" type="text" />
    <input name="ownerName" type="text" />
    <input name="phone" type="tel" />
    <input name="email" type="email" />
    <input name="locations" type="text" />
    <input name="revenue" type="text" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
